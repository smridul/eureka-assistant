name: EurekaAssistant
options:
  bundleIdPrefix: com.mridulshrivastava
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "SPB6M3V9N2"

targets:
  EurekaAssistant:
    type: application
    platform: iOS
    sources:
      - EurekaAssistant
    settings:
      base:
        INFOPLIST_FILE: EurekaAssistant/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.mridulshrivastava.eureka-assistant
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  EurekaAssistant:
    build:
      targets:
        EurekaAssistant: all
    run:
      config: Debug
